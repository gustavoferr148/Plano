[theme]
# Cor principal (botões, barra de progresso, sliders)
primaryColor = "#0C1C4C" 

# Cor de fundo principal da tela (Branco)
backgroundColor = "#FFFFFF" 

# Cor de fundo secundária para o painel lateral (Cinza muito claro para dar contraste sutil)
secondaryBackgroundColor = "#F8F9FA" 

# Cor do texto principal
textColor = "#0C1C4C" 

# Fonte
font = "sans serif"
